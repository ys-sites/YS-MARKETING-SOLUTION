    <!-- Structured Local Business Schema for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "YS Marketing Solutions",
      "image": "https://www.ysdev.ca/YS.png",
      "@id": "https://www.ysdev.ca/#website",
      "url": "https://www.ysdev.ca/",
      "telephone": "+14384048385",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Montreal",
        "addressRegion": "QC",
        "addressCountry": "CA"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 45.5017,
        "longitude": -73.5673
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://www.instagram.com/ys.sites/"
      ],
      "areaServed": {
        "@type": "AdministrativeArea",
        "name": "Montreal"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Digital Marketing & Web Design Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Website Development",
              "description": "Custom, high-performance websites built for speed and conversions."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Google Ranking (SEO)",
              "description": "Rank higher on Google and get found by customers searching for you."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Meta Ads",
              "description": "Targeted Facebook and Instagram ads that bring in leads fast."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Social Media",
              "description": "Consistent, on-brand content that grows a real, engaged following."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Content Creation",
              "description": "Copy, graphics, and brand assets that look professional and convert."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Digital Strategy",
              "description": "A clear growth plan built around your numbers, not guesswork."
            }
          }
        ]
      }
    }
    </script>

    <!-- Preconnect for zero-latency font & CDN connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />

    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.prod.website-files.com" />
